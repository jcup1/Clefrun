<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Clefrun Score Renderer</title>
  <script
    src="https://cdn.jsdelivr.net/npm/opensheetmusicdisplay@1.9.2/build/opensheetmusicdisplay.min.js"
    integrity="sha384-ayd7AZGRW8a4B990AVWtFlMROQBEIG80Iv+jdk9ejqvApFYdZKlcxhe0PCdVDClg"
    crossorigin="anonymous"></script>
  <style>
    :root {
      color-scheme: light;
      --stone: #ece7dc;
      --paper: #fffaf0;
      --ink: #2f2a24;
      --line: #ddd4c2;
      --error: #8f3526;
      --accent: #2c596d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #f5f1e7 0%, var(--stone) 100%);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
    }

    #reader {
      min-height: 100vh;
      padding: 8px 6px;
    }

    #score {
      min-height: calc(100vh - 16px);
      width: 100%;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--paper);
      box-shadow: 0 8px 24px rgba(42, 33, 17, 0.08);
      overflow-x: auto;
      overflow-y: hidden;
    }

    #status {
      position: fixed;
      top: 8px;
      left: 10px;
      max-width: 60vw;
      padding: 4px 8px;
      border-radius: 8px;
      background: rgba(255, 250, 240, 0.86);
      border: 1px solid rgba(44, 89, 109, 0.25);
      font-size: 14px;
      color: var(--accent);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    #status.error {
      color: var(--error);
      font-weight: 600;
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="reader">
    <div id="status"></div>
    <div id="score"></div>
  </div>
  <script>
    const scoreContainer = document.getElementById("score");
    const statusNode = document.getElementById("status");
    let osmd = null;

    function setStatus(message, isError) {
      statusNode.textContent = message;
      statusNode.className = isError ? "error" : "";
    }

    window.renderMusicXml = async function renderMusicXml(xmlString) {
      try {
        if (!window.opensheetmusicdisplay || !window.opensheetmusicdisplay.OpenSheetMusicDisplay) {
          throw new Error("OpenSheetMusicDisplay failed to load. Check network access for the CDN script.");
        }

        if (!osmd) {
          osmd = new window.opensheetmusicdisplay.OpenSheetMusicDisplay(scoreContainer, {
            autoResize: true,
            drawingParameters: "compacttight"
          });
        }

        setStatus("Rendering score...", false);
        await osmd.load(xmlString);
        osmd.render();
        setStatus("", false);
      } catch (error) {
        console.error(error);
        setStatus(error && error.message ? error.message : "Unknown rendering error.", true);
      }
    };
  </script>
</body>
</html>
